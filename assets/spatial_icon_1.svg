<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definitions for filters (glow effects) -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Robot Arm base platform -->
  <path d="M 15 85 L 75 85 M 30 85 L 30 80 L 60 80 L 60 85" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" />
  
  <!-- Joint 1 (Bottom) -->
  <circle cx="45" cy="75" r="6" stroke="#2DD4BF" stroke-width="2.5" fill="#060E11" filter="url(#glow)" />
  
  <!-- Lower Arm segment -->
  <line x1="45" y1="75" x2="30" y2="45" stroke="#2DD4BF" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Joint 2 (Middle) -->
  <circle cx="30" cy="45" r="5" stroke="#2DD4BF" stroke-width="2.5" fill="#060E11" filter="url(#glow)" />
  
  <!-- Upper Arm segment -->
  <line x1="30" y1="45" x2="60" y2="30" stroke="#2DD4BF" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Gripper/Claw -->
  <path d="M 60 30 L 68 30 M 68 25 L 74 25 M 68 35 L 74 35" stroke="#2DD4BF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" />
  
  <!-- Target object (Cube) being gripped -->
  <polygon points="76,26 86,20 96,26 96,38 86,44 76,38" stroke="#2DD4BF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="rgba(45, 212, 191, 0.25)" filter="url(#glow)" />
  <line x1="86" y1="20" x2="86" y2="44" stroke="#2DD4BF" stroke-width="1.5" stroke-dasharray="2,2" />
  <line x1="76" y1="26" x2="86" y2="32" stroke="#2DD4BF" stroke-width="1.5" />
  <line x1="96" y1="26" x2="86" y2="32" stroke="#2DD4BF" stroke-width="1.5" />
</svg>
