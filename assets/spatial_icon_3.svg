<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Grid lines (faint) -->
  <line x1="20" y1="10" x2="20" y2="90" stroke="rgba(45, 212, 191, 0.12)" stroke-width="1" />
  <line x1="40" y1="10" x2="40" y2="90" stroke="rgba(45, 212, 191, 0.12)" stroke-width="1" />
  <line x1="60" y1="10" x2="60" y2="90" stroke="rgba(45, 212, 191, 0.12)" stroke-width="1" />
  <line x1="80" y1="10" x2="80" y2="90" stroke="rgba(45, 212, 191, 0.12)" stroke-width="1" />
  <line x1="10" y1="20" x2="90" y2="20" stroke="rgba(45, 212, 191, 0.12)" stroke-width="1" />
  <line x1="10" y1="40" x2="90" y2="40" stroke="rgba(45, 212, 191, 0.12)" stroke-width="1" />
  <line x1="10" y1="60" x2="90" y2="60" stroke="rgba(45, 212, 191, 0.12)" stroke-width="1" />
  <line x1="10" y1="80" x2="90" y2="80" stroke="rgba(45, 212, 191, 0.12)" stroke-width="1" />
  
  <!-- Path (Navigation Route) -->
  <path d="M 20 80 L 50 80 L 50 40 L 80 40" stroke="#2DD4BF" stroke-width="3.5" fill="none" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Obstacle grids/blocks on the map -->
  <rect x="55" y="15" width="10" height="10" rx="2" stroke="#2DD4BF" stroke-width="1.8" fill="rgba(45, 212, 191, 0.25)" filter="url(#glow)" />
  <rect x="68" y="15" width="10" height="10" rx="2" stroke="#2DD4BF" stroke-width="1.8" fill="rgba(45, 212, 191, 0.25)" filter="url(#glow)" />
  <rect x="68" y="28" width="10" height="10" rx="2" stroke="#2DD4BF" stroke-width="1.8" fill="rgba(45, 212, 191, 0.25)" filter="url(#glow)" />
  
  <!-- Vehicle/Car icon moving on path -->
  <rect x="10" y="71" width="20" height="15" rx="3.5" stroke="#2DD4BF" stroke-width="2.2" fill="#060E11" filter="url(#glow)" />
  <circle cx="15" cy="86" r="3" stroke="#2DD4BF" stroke-width="1.5" fill="#2DD4BF" />
  <circle cx="25" cy="86" r="3" stroke="#2DD4BF" stroke-width="1.5" fill="#2DD4BF" />
  
  <!-- Autonomous Sensors/Lidar lines from car -->
  <path d="M 20 64 C 20 64 22 61 25 61 C 28 61 30 64 30 64" stroke="#2DD4BF" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#glow)" />
  <path d="M 17 59 C 17 59 21 55 25 55 C 29 55 33 59 33 59" stroke="#2DD4BF" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Dest/Waypoint marker -->
  <circle cx="80" cy="40" r="5" stroke="#2DD4BF" stroke-width="2" fill="rgba(45, 212, 191, 0.6)" filter="url(#glow)" />
  <circle cx="80" cy="40" r="1.5" fill="#2DD4BF" />
</svg>
