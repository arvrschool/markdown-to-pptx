<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Conveyor Belt -->
  <rect x="15" y="70" width="55" height="9" rx="4.5" stroke="#2DD4BF" stroke-width="2.2" fill="none" filter="url(#glow)" />
  <circle cx="24" cy="74.5" r="2.5" stroke="#2DD4BF" stroke-width="1.2" fill="none" />
  <circle cx="42.5" cy="74.5" r="2.5" stroke="#2DD4BF" stroke-width="1.2" fill="none" />
  <circle cx="61" cy="74.5" r="2.5" stroke="#2DD4BF" stroke-width="1.2" fill="none" />
  
  <!-- Robotic assembly arm standing on conveyor -->
  <rect x="25" y="60" width="10" height="10" rx="1" stroke="#2DD4BF" stroke-width="2" fill="#060E11" filter="url(#glow)" />
  <line x1="30" y1="60" x2="35" y2="38" stroke="#2DD4BF" stroke-width="2.8" stroke-linecap="round" filter="url(#glow)" />
  <line x1="35" y1="38" x2="48" y2="34" stroke="#2DD4BF" stroke-width="2.8" stroke-linecap="round" filter="url(#glow)" />
  <path d="M 48 34 L 48 40 M 45 40 L 51 40" stroke="#2DD4BF" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Boxes on conveyor -->
  <rect x="37" y="55" width="9" height="9" rx="1.5" stroke="#2DD4BF" stroke-width="1.5" fill="rgba(45, 212, 191, 0.2)" filter="url(#glow)" />
  
  <!-- Factory worker profile on the right -->
  <!-- Helmet -->
  <path d="M 77 31 C 77 26 80 23 85 23 C 90 23 93 26 93 31 Z" fill="#2DD4BF" filter="url(#glow)" />
  <line x1="74" y1="31" x2="96" y2="31" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Head -->
  <circle cx="85" cy="35" r="5" stroke="#2DD4BF" stroke-width="1.8" fill="#060E11" filter="url(#glow)" />
  
  <!-- Body/Shoulders -->
  <path d="M 75 49 C 75 44 78 41 85 41 C 92 41 95 44 95 49 L 95 82 L 75 82 Z" stroke="#2DD4BF" stroke-width="2.2" stroke-linejoin="round" fill="#060E11" filter="url(#glow)" />
  <line x1="85" y1="41" x2="85" y2="58" stroke="#2DD4BF" stroke-width="1.5" />
  
  <!-- Clipboard/tablet held by worker -->
  <rect x="67" y="44" width="10" height="13" rx="1.2" stroke="#2DD4BF" stroke-width="1.5" fill="rgba(45, 212, 191, 0.3)" filter="url(#glow)" />
  <line x1="70" y1="48" x2="74" y2="48" stroke="#2DD4BF" stroke-width="1" />
  <line x1="70" y1="52" x2="74" y2="52" stroke="#2DD4BF" stroke-width="1" />
</svg>
