<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Left vertical projection screen -->
  <polygon points="10,25 22,18 22,58 10,65" stroke="#2DD4BF" stroke-width="1.8" stroke-linejoin="round" fill="rgba(45, 212, 191, 0.15)" filter="url(#glow)" />
  <line x1="10" y1="45" x2="22" y2="38" stroke="#2DD4BF" stroke-width="1" stroke-dasharray="2,2" />
  
  <!-- Ray lines from screen to cube -->
  <line x1="22" y1="28" x2="38" y2="28" stroke="#2DD4BF" stroke-width="1" stroke-dasharray="3,3" filter="url(#glow)" />
  <line x1="22" y1="38" x2="50" y2="38" stroke="#2DD4BF" stroke-width="1" stroke-dasharray="3,3" filter="url(#glow)" />
  <line x1="22" y1="48" x2="38" y2="52" stroke="#2DD4BF" stroke-width="1" stroke-dasharray="3,3" filter="url(#glow)" />

  <!-- 3D Isometric Cube -->
  <!-- Top Face -->
  <polygon points="50,22 75,34 50,46 25,34" stroke="#2DD4BF" stroke-width="2.2" stroke-linejoin="round" fill="rgba(45, 212, 191, 0.1)" filter="url(#glow)" />
  <!-- Left Face -->
  <polygon points="25,34 50,46 50,72 25,60" stroke="#2DD4BF" stroke-width="2.2" stroke-linejoin="round" fill="rgba(45, 212, 191, 0.15)" filter="url(#glow)" />
  <!-- Right Face -->
  <polygon points="50,46 75,34 75,60 50,72" stroke="#2DD4BF" stroke-width="2.2" stroke-linejoin="round" fill="rgba(45, 212, 191, 0.25)" filter="url(#glow)" />

  <!-- Radar/Sonar waves below the cube -->
  <path d="M 33 78 A 20 8 0 0 0 67 78" stroke="#2DD4BF" stroke-width="1.5" fill="none" stroke-dasharray="3,3" filter="url(#glow)" />
  <path d="M 23 83 A 32 12 0 0 0 77 83" stroke="#2DD4BF" stroke-width="2" fill="none" filter="url(#glow)" />
  <path d="M 13 88 A 44 16 0 0 0 87 88" stroke="#2DD4BF" stroke-width="2" fill="none" filter="url(#glow)" />

  <!-- Projection lines from radar center to cube base -->
  <line x1="50" y1="92" x2="25" y2="60" stroke="#2DD4BF" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="50" y1="92" x2="75" y2="60" stroke="#2DD4BF" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="50" y1="92" x2="50" y2="72" stroke="#2DD4BF" stroke-width="1.5" filter="url(#glow)" />
</svg>
